<!DOCTYPE html>
<!--
  灵犀 AI 对话助手 — 页面入口（结构 + 静态 UI；业务逻辑在 js/）

  纵向布局（flex 列，占满一屏 h-screen）：
    #chatHeader      对话顶栏（默认隐藏）
    #welcomeSection  欢迎页（默认显示）  } 二选一，由 index.js enterChat / goHome 切换
    #chatSection     消息区（默认隐藏）  }
    底部输入区        始终显示

  脚本顺序：constants → theme → ui → api → index

  底部区常用 id（index.js 会 getElementById）：
    messageInput  sendBtn  stopBtn  imageUpload  imagePreview
    themeBtn  clearBtn  apiKeyBtn  backBtn
  建议卡：class=".suggestion-card"，文案在 data-prompt
-->
<html lang="zh-CN" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPS 灵犀</title>
    <link rel="icon" href="./assets/logo.png" type="image/png">

    <!-- Tailwind CDN：布局工具类；darkMode 与 theme.js 在 <html> 上切换的 dark 类配合 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["'Noto Sans SC'", 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- highlight.js：渲染 AI 代码块后高亮（ui.js → hljs.highlightElement） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- marked：Markdown → HTML（api.js 设选项，ui.js renderMarkdown 调用） -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- 自定义 CSS：渐变标题、消息动画、气泡内 Markdown 等 -->
    <link rel="stylesheet" href="./css/index.css">
</head>

<!-- 深色默认色；切浅色时 theme.js → applyThemeStyles 会改 body 行内样式 -->
<body class="h-full font-sans overflow-hidden" style="background:#0f1423;color:#f1f5f9">

<div class="flex flex-col h-screen">

    <!-- ===== 区域 A：对话顶栏（进入聊天后显示）===== -->
    <!-- id 供 index.js：chatHeader、backBtn。默认 class 含 hidden -->
    <header id="chatHeader" class="hidden items-center justify-between px-4 py-2.5 flex-shrink-0"
            style="border-bottom:1px solid rgba(255,255,255,0.08);background:#0f1423">
        <button id="backBtn" class="flex items-center gap-1.5 text-sm text-slate-400 transition-colors px-3 py-1.5 rounded-lg">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            返回主页
        </button>
        <span class="flex items-center gap-2 text-sm font-medium text-slate-500">
            <img src="./assets/logo.png" alt="灵犀" class="w-5 h-5 rounded logo-img" onerror="this.style.display='none'">
            灵犀 AI 助手
        </span>
    </header>

    <!-- ===== 区域 B：欢迎页（首屏，默认显示）===== -->
    <!-- #welcomeSection：首条消息发送后由 enterChat() 隐藏；标题渐变见 css .welcome-title -->
    <div id="welcomeSection" class="flex-1 flex flex-col items-center justify-center px-6 overflow-y-auto animate-fadeIn" style="padding-bottom:6vh">
        <div class="w-full max-w-4xl mx-auto">

            <!-- 标题区：左对齐，与卡片网格同宽 -->
            <div class="mb-14">
                <h1 class="welcome-title font-bold mb-5" style="font-size:3rem">嗨，我是灵犀</h1>
                <p class="welcome-subtitle" style="font-size:1.25rem">我能帮你什么吗？</p>
            </div>

            <!-- 建议卡：.suggestion-card + data-prompt；点击后 index.js 填入输入框并发送 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                <!-- 卡片1：代码图标，蓝色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="我是一名前端开发初学者，如何提升相关技能？">
                    <p class="text-sm text-white leading-relaxed pr-12">我是一名前端开发初学者，如何提升相关技能？</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-xl flex items-center justify-center"
                         style="background:linear-gradient(135deg,rgba(59,130,246,0.3),rgba(59,130,246,0.1));box-shadow:0 2px 8px rgba(59,130,246,0.25);border:1px solid rgba(59,130,246,0.2)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                    </div>
                </div>

                <!-- 卡片2：礼物图标，绿色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="有哪些平价又新颖的生日礼物适合送朋友。">
                    <p class="text-sm text-white leading-relaxed pr-12">有哪些平价又新颖的生日礼物适合送朋友。</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-xl flex items-center justify-center"
                         style="background:linear-gradient(135deg,rgba(34,197,94,0.3),rgba(34,197,94,0.1));box-shadow:0 2px 8px rgba(34,197,94,0.25);border:1px solid rgba(34,197,94,0.2)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 12 20 22 4 22 4 12"></polyline>
                            <rect x="2" y="7" width="20" height="5"></rect>
                            <path d="M12 22V7"></path>
                            <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                            <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                        </svg>
                    </div>
                </div>

                <!-- 卡片3：派对图标，橙色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="准备在家里办一个大型家庭聚会，帮我计划。">
                    <p class="text-sm text-white leading-relaxed pr-12">准备在家里办一个大型家庭聚会，帮我计划。</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-xl flex items-center justify-center"
                         style="background:linear-gradient(135deg,rgba(251,146,60,0.3),rgba(251,146,60,0.1));box-shadow:0 2px 8px rgba(251,146,60,0.25);border:1px solid rgba(251,146,60,0.2)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"></path>
                            <path d="M12 8v4l2 2"></path>
                        </svg>
                    </div>
                </div>

                <!-- 卡片4：树木图标，紫色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="带小朋友去野餐，有什么好玩的活动建议吗？">
                    <p class="text-sm text-white leading-relaxed pr-12">带小朋友去野餐，有什么好玩的活动建议吗？</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-xl flex items-center justify-center"
                         style="background:linear-gradient(135deg,rgba(167,139,250,0.3),rgba(167,139,250,0.1));box-shadow:0 2px 8px rgba(167,139,250,0.25);border:1px solid rgba(167,139,250,0.2)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 14c1.5-1 2-2.5 2-4a7 7 0 0 0-14 0c0 1.5.5 3 2 4"></path>
                            <path d="M12 14v8"></path>
                            <path d="M8 18h8"></path>
                            <path d="M7 10c0-2 1.5-3.5 5-5 3.5 1.5 5 3 5 5"></path>
                        </svg>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ===== 区域 C：对话消息区（默认 hidden，与欢迎页互斥）===== -->
    <!-- #chatMessages：空容器；气泡由 ui.js addMessage() 插入；滚动监听在 index.js -->
    <div id="chatSection" class="hidden flex-1 overflow-y-auto px-6 py-6" style="padding-bottom:1rem">
        <div id="chatMessages" class="flex flex-col gap-5 max-w-4xl mx-auto"></div>
    </div>

    <!-- ===== 区域 D：底部输入区（始终显示）===== -->
    <!-- 下列 id 在 index.js 开头绑定；theme-input-area 背景由 theme.js 同步 -->
    <div class="flex-shrink-0 px-6 pb-3 pt-3 theme-input-area" style="background:#0f1423">
        <div class="max-w-4xl mx-auto">

            <!-- 一行布局：左侧胶囊输入框（flex-1）+ 右侧圆形工具按钮 -->
            <div class="flex items-end gap-3">

                <!-- 胶囊容器：内含 textarea + 右下角悬浮按钮组（上传/预览/发送/停止） -->
                <div class="flex-1 relative transition-all theme-input-pill"
                     style="background:#1e293b;border-radius:24px;min-height:45px">

                    <!-- #messageInput：Enter 发送、Shift+Enter 换行；高度由 ui.js autoResizeTextarea 调整 -->
                    <textarea
                        id="messageInput"
                        class="w-full bg-transparent text-sm resize-none outline-none max-h-40 block"
                        style="color:#f1f5f9;caret-color:#a78bfa;padding:12px 64px 12px 20px;margin:0;line-height:1.5;height:45px;overflow-y:hidden;box-sizing:border-box;width:calc(100% - 10px);margin-right:10px"
                        placeholder="有问题尽管问我"
                        rows="1"
                    ></textarea>

                    <!-- 绝对定位在胶囊右下角；有文字或图片时 ui.js 显示 #sendBtn -->
                    <div class="absolute flex items-center gap-1.5" style="bottom:9px;right:20px;max-width:55%;z-index:10">

                        <!-- #imageUpload：hidden，点击 label 触发；change → api.js handleImageUpload -->
                        <label class="cursor-pointer transition-colors flex-shrink-0 upload-label" data-tooltip="上传图片">
                            <svg class="w-5 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                            <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">
                        </label>

                        <!-- #imagePreview：缩略图由 ui.js renderImagePreview 动态插入 -->
                        <div id="imagePreview" class="flex items-center gap-1 flex-wrap"></div>

                        <!-- #sendBtn / #stopBtn：生成中与 api.js 互换显示；点击 → sendMessage / stopGeneration -->
                        <button id="sendBtn" style="display:none" data-tooltip="发送消息"
                                class="w-7 h-7 flex items-center justify-center rounded-full bg-blue-500 hover:bg-blue-400 text-white transition-all flex-shrink-0">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>

                        <!-- #stopBtn：流式生成中显示，点击 api.js stopGeneration 中断请求 -->
                        <button id="stopBtn" style="display:none" data-tooltip="停止生成"
                                class="w-7 h-7 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-400 text-white transition-colors flex-shrink-0">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>

                    </div>

                </div>

                <!-- #themeBtn → theme.js toggleTheme；sun-icon / moon-icon 由 syncThemeIcons 显隐 -->
                <button id="themeBtn" data-tooltip="切换主题"
                        class="w-12 flex items-center justify-center rounded-full flex-shrink-0 transition-colors"
                        style="background:#1e293b;color:#64748b;height:45px">
                    <svg class="sun-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <!-- #clearBtn → index.js clearConversation（清空历史并 goHome） -->
                <button id="clearBtn" data-tooltip="清除对话"
                        class="w-12 flex items-center justify-center rounded-full flex-shrink-0 transition-colors"
                        style="background:#1e293b;color:#64748b;height:45px">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- 桶盖 -->
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
                        <!-- 桶身 -->
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <!-- 内部三条线 -->
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </svg>
                </button>

                <!-- #apiKeyBtn → index.js changeApiKey（prompt 写入 localStorage） -->
                <button id="apiKeyBtn" data-tooltip="更换 API Key"
                        class="w-12 flex items-center justify-center rounded-full flex-shrink-0 transition-colors"
                        style="background:#1e293b;color:#64748b;height:45px">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                </button>
            </div>

            <!-- 静态免责声明；样式见 css .footer-disclaimer -->
            <p class="text-center mt-3 footer-disclaimer" style="font-size:11px">
                内容由 AI 大模型生成，请仔细甄别
            </p>
        </div>
    </div>

</div>

<!-- 1 constants：API 地址、模型名、localStorage 键名 -->
<script src="./js/constants.js"></script>
<!-- 2 theme：深/浅色 initTheme、toggleTheme -->
<script src="./js/theme.js"></script>
<!-- 3 ui：消息气泡、Markdown、Toast、输入框高度 -->
<script src="./js/ui.js"></script>
<!-- 4 api：流式请求、图片上传、XSS 过滤 -->
<script src="./js/api.js"></script>
<!-- 5 index：DOM 引用、事件绑定、sendMessage 总控（最后加载） -->
<script src="./js/index.js"></script>
</body>
</html>
