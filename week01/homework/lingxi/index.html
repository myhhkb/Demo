<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嗨，我是灵犀 - AI 对话助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["'Noto Sans SC'", 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body class="h-full bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans overflow-hidden">

<div class="flex flex-col h-screen">

    <!-- 对话页顶部导航栏 -->
    <header id="chatHeader" class="hidden items-center justify-between px-4 py-2.5 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 flex-shrink-0">
        <button id="backBtn" class="flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            返回主页
        </button>
        <span class="text-sm font-medium text-slate-400 dark:text-slate-500">灵犀 AI 助手</span>
        <button id="themeBtn2" title="切换主题" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
            <svg class="sun-icon w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <!-- 欢迎区域 -->
    <div id="welcomeSection" class="flex-1 flex flex-col items-center justify-center px-6 py-10 overflow-y-auto animate-fadeIn">
        <div class="text-center mb-14">
            <h1 class="welcome-title text-5xl font-bold mb-3 tracking-tight">嗨，我是灵犀</h1>
            <p class="text-lg text-slate-500 dark:text-slate-400 font-medium">我能帮你什么？</p>
        </div>

        <!-- 快捷建议卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
            <div class="suggestion-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-200 flex flex-col items-center gap-3 text-center"
                 data-prompt="帮我写一个简单的Python爬虫，爬取网站的标题和链接">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background:linear-gradient(135deg,#667eea,#764ba2)">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                </div>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">帮我写一个简单的Python爬虫，爬取网站的标题和链接</p>
            </div>

            <div class="suggestion-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-200 flex flex-col items-center gap-3 text-center"
                 data-prompt="有哪些学习JavaScript的好方法？">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background:linear-gradient(135deg,#f093fb,#f5576c)">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
                </div>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">有哪些学习JavaScript的好方法？</p>
            </div>

            <div class="suggestion-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-200 flex flex-col items-center gap-3 text-center"
                 data-prompt="请解释一下什么是RESTful API，并给出一个简单的例子">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
                </div>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">请解释一下什么是RESTful API，并给出一个简单的例子</p>
            </div>

            <div class="suggestion-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-200 flex flex-col items-center gap-3 text-center"
                 data-prompt="帮我生成一个创意的产品名称和标语">
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white" style="background:linear-gradient(135deg,#fa709a,#fee140)">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
                </div>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">帮我生成一个创意的产品名称和标语</p>
            </div>
        </div>

        <!-- 欢迎页主题切换 -->
        <button id="themeBtn" title="切换主题" class="mt-10 w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400">
            <svg class="sun-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>

    <!-- 对话区域 -->
    <div id="chatSection" class="hidden flex-1 overflow-y-auto px-4 py-6">
        <div id="chatMessages" class="flex flex-col gap-5 max-w-3xl mx-auto"></div>
    </div>

    <!-- 底部输入区 -->
    <div class="flex-shrink-0 px-4 pb-5 pt-3 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
        <div class="max-w-3xl mx-auto">
            <!-- 图片预览 -->
            <div id="imagePreview" class="flex gap-2 mb-2 flex-wrap"></div>

            <div class="flex items-end gap-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl px-4 py-2 focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/20 transition-all">
                <textarea
                    id="messageInput"
                    class="flex-1 bg-transparent text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 resize-none outline-none py-2 max-h-32"
                    placeholder="在此输入您的问题..."
                    rows="1"
                ></textarea>

                <div class="flex items-center gap-1.5 flex-shrink-0 pb-1">
                    <!-- 上传图片 -->
                    <label class="w-8 h-8 flex items-center justify-center rounded-full cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" title="上传图片">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <input type="file" id="imageUpload" accept="image/*" class="hidden">
                    </label>

                    <!-- 清除对话 -->
                    <button id="clearBtn" title="清除对话" class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>

                    <!-- 发送按钮 -->
                    <button id="sendBtn" style="display:none" class="w-8 h-8 flex items-center justify-center rounded-full bg-blue-500 hover:bg-blue-600 text-white transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>

                    <!-- 停止按钮 -->
                    <button id="stopBtn" style="display:none" class="w-8 h-8 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-600 text-white transition-colors">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="text-xs text-slate-400 dark:text-slate-600 text-center mt-2">按 Enter 发送，Shift + Enter 换行</p>
        </div>
    </div>

</div>

<script src="./js/config.js"></script>
<script src="./js/index.js"></script>
</body>
</html>
