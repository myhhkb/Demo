<!DOCTYPE html>
<html lang="zh-CN" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嗨，我是灵犀 - AI 对话助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["'Noto Sans SC'", 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body class="h-full font-sans overflow-hidden" style="background:#0f1423;color:#f1f5f9">

<div class="flex flex-col h-screen">

    <!-- ===== 对话页顶部导航栏（D-02 锁定：返回主页在左侧）===== -->
    <header id="chatHeader" class="hidden items-center justify-between px-4 py-2.5 flex-shrink-0"
            style="border-bottom:1px solid rgba(255,255,255,0.08);background:#0f1423">
        <button id="backBtn" class="flex items-center gap-1.5 text-sm text-slate-400 hover:text-white transition-colors px-3 py-1.5 rounded-lg hover:bg-white/10">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            返回主页
        </button>
        <span class="text-sm font-medium text-slate-500">灵犀 AI 助手</span>
        <!-- D-01 锁定：主题切换在右侧 -->
        <button id="themeBtn2" title="切换主题"
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-slate-400">
            <svg class="sun-icon w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <!-- ===== 欢迎区域 ===== -->
    <div id="welcomeSection" class="flex-1 flex flex-col items-center justify-center px-6 overflow-y-auto animate-fadeIn" style="padding-bottom:6vh">
        <div class="w-full max-w-4xl mx-auto">

            <!-- 标题区：左对齐，与卡片网格同宽 -->
            <div class="mb-10">
                <h1 class="welcome-title font-bold mb-4" style="font-size:3rem">嗨，我是灵犀</h1>
                <p class="welcome-subtitle" style="font-size:1.25rem">我能帮你什么吗？</p>
            </div>

            <!-- 快捷建议卡片（图标绝对定位右下角）-->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                <!-- 卡片1：铅笔图标，蓝色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="我是一名前端开发初学者，如何提升相关技能？">
                    <p class="text-sm text-white leading-relaxed pr-12">我是一名前端开发初学者，如何提升相关技能？</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center"
                         style="background:rgba(59,130,246,0.15)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                        </svg>
                    </div>
                </div>

                <!-- 卡片2：灯泡图标，绿色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="有哪些平价又新颖的生日礼物适合送朋友。">
                    <p class="text-sm text-white leading-relaxed pr-12">有哪些平价又新颖的生日礼物适合送朋友。</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center"
                         style="background:rgba(34,197,94,0.15)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
                            <path d="M9 18h6"></path>
                            <path d="M10 22h4"></path>
                            <path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6H8c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"></path>
                        </svg>
                    </div>
                </div>

                <!-- 卡片3：指南针图标，橙色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="准备在家里办一个大型家庭聚会，帮我计划。">
                    <p class="text-sm text-white leading-relaxed pr-12">准备在家里办一个大型家庭聚会，帮我计划。</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center"
                         style="background:rgba(251,146,60,0.15)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                        </svg>
                    </div>
                </div>

                <!-- 卡片4：扳手图标，紫色 -->
                <div class="suggestion-card theme-card relative rounded-2xl p-5 cursor-pointer transition-all duration-200 overflow-hidden"
                     style="background:#1e293b;min-height:130px"
                     data-prompt="带小朋友去野餐，有什么好玩的活动建议吗？">
                    <p class="text-sm text-white leading-relaxed pr-12">带小朋友去野餐，有什么好玩的活动建议吗？</p>
                    <div class="absolute bottom-4 right-4 w-10 h-10 rounded-full flex items-center justify-center"
                         style="background:rgba(167,139,250,0.15)">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ===== 对话区域 ===== -->
    <div id="chatSection" class="hidden flex-1 overflow-y-auto px-4 py-6">
        <div id="chatMessages" class="flex flex-col gap-5 max-w-3xl mx-auto"></div>
    </div>

    <!-- ===== 底部输入区（与卡片网格宽度一致 max-w-4xl）===== -->
    <div class="flex-shrink-0 px-6 pb-3 pt-3 theme-input-area" style="background:#0f1423">
        <div class="max-w-4xl mx-auto">

            <!-- 输入行：胶囊 + 右侧按钮组 -->
            <div class="flex items-center gap-3">

                <!-- 胶囊形输入框 -->
                <div class="flex-1 flex items-center gap-2 px-5 transition-all theme-input-pill"
                     style="background:#1e293b;border-radius:9999px;min-height:52px">

                    <!-- 左侧：文字输入区 -->
                    <textarea
                        id="messageInput"
                        class="flex-1 bg-transparent text-sm resize-none outline-none py-4 max-h-28"
                        style="color:#f1f5f9;caret-color:#a78bfa"
                        placeholder="有问题尽管问我"
                        rows="1"
                    ></textarea>

                    <!-- 右侧功能区：回形针 + 图片预览小圆圈 + 发送/停止 -->
                    <div class="flex items-center gap-2 flex-shrink-0">

                        <!-- 回形针图标 -->
                        <label class="cursor-pointer transition-colors flex-shrink-0" style="color:#64748b" title="上传图片">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                            <input type="file" id="imageUpload" accept="image/*" class="hidden">
                        </label>

                        <!-- 图片预览小圆圈容器（上传后动态插入）-->
                        <div id="imagePreview" class="flex items-center gap-1.5"></div>

                        <!-- 发送按钮 -->
                        <button id="sendBtn" style="display:none"
                                class="w-8 h-8 flex items-center justify-center rounded-full bg-blue-500 hover:bg-blue-400 text-white transition-colors flex-shrink-0">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>

                        <!-- 停止按钮 -->
                        <button id="stopBtn" style="display:none"
                                class="w-8 h-8 flex items-center justify-center rounded-full bg-red-500 hover:bg-red-400 text-white transition-colors flex-shrink-0">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>

                    </div>
                </div>

                <!-- D-01 锁定：主题切换按钮在输入框右侧 -->
                <button id="themeBtn" title="切换主题"
                        class="w-12 h-12 flex items-center justify-center rounded-full flex-shrink-0 transition-colors"
                        style="background:#1e293b;color:#64748b">
                    <svg class="sun-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <!-- 清除按钮 -->
                <button id="clearBtn" title="清除对话"
                        class="w-12 h-12 flex items-center justify-center rounded-full flex-shrink-0 transition-colors"
                        style="background:#1e293b;color:#64748b">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>

            <!-- 页脚免责声明 -->
            <p class="text-center mt-3 footer-disclaimer" style="font-size:11px;color:rgba(255,255,255,0.2)">
                内容由 AI 大模型生成，请仔细甄别
            </p>
        </div>
    </div>

</div>

<script src="./js/config.js"></script>
<script src="./js/index.js"></script>
</body>
</html>
