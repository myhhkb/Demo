<!DOCTYPE html>
<!--
  文档类型声明：告诉浏览器这是一个 HTML5 页面。
  如果没有这行，浏览器可能会用兼容模式解析页面，导致显示效果异常。
-->
<html lang="zh-CN">
<head>
  <!-- 字符编码：使用 UTF-8，保证中文正常显示 -->
  <meta charset="UTF-8">

  <!-- 视口设置：让页面在手机等移动设备上正确缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 浏览器标签页标题 -->
  <title>练习</title>
</head>
<body>
  <!--
    这是页面主体内容区域。
    这里先放了一个最基础的 div，用来演示最简单的 HTML 页面结构。
  -->
  <div>你好，前端！</div>
</body>
</html>
